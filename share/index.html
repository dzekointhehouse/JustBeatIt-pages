<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dancing Feet - Open in App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 400px; }
    h1 { font-size: 28px; margin-bottom: 12px; }
    p { font-size: 16px; color: #b0b0c0; margin-bottom: 32px; line-height: 1.5; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #e94560;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #c73652; }
    .note { font-size: 13px; color: #707080; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dancing Feet</h1>
    <p>Someone shared a dance event with you. Get the app to view it.</p>
    <a id="store-link" class="btn" href="#">Download App</a>
    <p class="note">Already have the app? Tap the link again after installing.</p>
  </div>
  <script>
    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var link = document.getElementById('store-link');
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        link.href = 'https://apps.apple.com/app/dancing-feet';
        link.textContent = 'Download on the App Store';
      } else {
        link.href = 'https://play.google.com/store/apps/details?id=com.elvirdzeko.dancingfeet';
        link.textContent = 'Get it on Google Play';
      }
    })();
  </script>
</body>
</html>
