<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dancing Feet - Dance Event</title>
  <meta name="apple-itunes-app" content="app-id=6752291467, app-argument=https://dancingfeet.app/share/event">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 400px; }
    h1 { font-size: 28px; margin-bottom: 12px; }
    p { font-size: 16px; color: #b0b0c0; margin-bottom: 32px; line-height: 1.5; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #e94560;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      transition: background 0.2s;
      margin-bottom: 12px;
    }
    .btn:hover { background: #c73652; }
    .btn-secondary {
      display: inline-block;
      padding: 12px 28px;
      background: transparent;
      color: #b0b0c0;
      text-decoration: none;
      border-radius: 12px;
      font-size: 15px;
      border: 1px solid #404060;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: #b0b0c0; }
    .note { font-size: 13px; color: #707080; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dancing Feet</h1>
    <p>Someone shared a dance event with you.</p>
    <a id="open-app" class="btn" href="#">Open in App</a>
    <br>
    <a id="store-link" class="btn-secondary" href="#">Don't have the app? Download it</a>
  </div>
  <script>
    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var storeLink = document.getElementById('store-link');
      var openApp = document.getElementById('open-app');
      var query = window.location.search;

      if (isIOS) {
        storeLink.href = 'https://apps.apple.com/app/dancing-feet';
        storeLink.textContent = "Don't have the app? App Store";
        openApp.href = storeLink.href;
        openApp.textContent = 'Download on the App Store';
      } else {
        storeLink.href = 'https://play.google.com/store/apps/details?id=com.elvirdzeko.dancingfeet';
        storeLink.textContent = "Don't have the app? Google Play";
        openApp.href = 'intent://dancingfeet.app/share/event' + query
          + '#Intent;scheme=https;package=com.elvirdzeko.dancingfeet;end';
      }

      // Auto-attempt to open the app
      if (!isIOS) {
        window.location.href = openApp.href;
      }
    })();
  </script>
</body>
</html>
